<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPMP8000 Emulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 2rem;
        }

        .status {
            font-size: 1.5rem;
            color: #ffd700;
            margin-bottom: 1rem;
        }

        .description {
            font-size: 1rem;
            color: #808080;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🎮</div>
        <h1>SPMP8000 Emulator</h1>
        <p class="subtitle">A SPMP8000 game emulator written in Rust</p>
        <p class="status">🚧 开发中，敬请期待 🚧</p>
        <p class="description">
            Development in progress, stay tuned.<br>
            正在开发中，敬请期待。
        </p>
    </div>
</body>
</html>
