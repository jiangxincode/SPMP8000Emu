name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: spmp8000-emu-linux-x86_64
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: spmp8000-emu-linux-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: spmp8000-emu-macos-x86_64
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: spmp8000-emu-macos-aarch64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: spmp8000-emu-windows-x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxkbcommon-dev

      - name: Build standalone
        run: cargo build -p spmp8000emu --release --target ${{ matrix.target }}

      - name: Build libretro core
        run: cargo build -p spmp8000emu-libretro --release --target ${{ matrix.target }}

      - name: Stage libretro core
        shell: bash
        run: |
          out="libretro/${{ matrix.artifact }}"
          mkdir -p "$out"
          rel="target/${{ matrix.target }}/release"
          # Cargo names the cdylib after its lib target (spmp8000emu); copy it
          # to the spmp8000emu_libretro.<ext> name RetroArch expects.
          for f in "spmp8000emu.dll:spmp8000emu_libretro.dll" \
                   "libspmp8000emu.so:spmp8000emu_libretro.so" \
                   "libspmp8000emu.dylib:spmp8000emu_libretro.dylib"; do
            src="${f%%:*}"; dst="${f##*:}"
            if [ -f "$rel/$src" ]; then
              cp "$rel/$src" "$out/$dst"
              break
            fi
          done
          cp crates/spmp8000emu-libretro/spmp8000emu_libretro.info "$out/spmp8000emu_libretro.info"
          ls -la "$out"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz spmp8000-emu
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.artifact }}.zip spmp8000-emu.exe
          cd ../../..

      - name: Package libretro (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd libretro
          tar czf ../${{ matrix.artifact }}-libretro.tar.gz ${{ matrix.artifact }}
          cd ..

      - name: Package libretro (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd libretro
          7z a ../${{ matrix.artifact }}-libretro.zip ${{ matrix.artifact }}
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.*
            ${{ matrix.artifact }}-libretro.*

  build-android:
    name: Build (Android)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: release-android

      - name: Build libretro core for Android
        run: |
          cargo ndk \
            -t arm64-v8a -t armeabi-v7a -t x86 -t x86_64 \
            --platform 21 \
            build -p spmp8000emu-libretro --release

      - name: Stage libretro core
        shell: bash
        run: |
          out="libretro/spmp8000-emu-android"
          mkdir -p "$out/arm64-v8a" "$out/armeabi-v7a" "$out/x86" "$out/x86_64"
          cp target/aarch64-linux-android/release/libspmp8000emu.so "$out/arm64-v8a/spmp8000emu_libretro_android.so"
          cp target/armv7-linux-androideabi/release/libspmp8000emu.so "$out/armeabi-v7a/spmp8000emu_libretro_android.so"
          cp target/i686-linux-android/release/libspmp8000emu.so "$out/x86/spmp8000emu_libretro_android.so"
          cp target/x86_64-linux-android/release/libspmp8000emu.so "$out/x86_64/spmp8000emu_libretro_android.so"
          cp crates/spmp8000emu-libretro/spmp8000emu_libretro.info "$out/"
          ls -laR "$out"

      - name: Package libretro
        shell: bash
        run: |
          cd libretro
          tar czf ../spmp8000-emu-android-libretro.tar.gz spmp8000-emu-android
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: spmp8000-emu-android
          path: spmp8000-emu-android-libretro.tar.gz

  build-ios:
    name: Build (iOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: release-ios

      - name: Build libretro core (arm64 device)
        run: cargo build -p spmp8000emu-libretro --release --target aarch64-apple-ios

      - name: Build libretro core (x86_64 device)
        run: cargo build -p spmp8000emu-libretro --release --target x86_64-apple-ios

      - name: Build libretro core (arm64 simulator)
        run: cargo build -p spmp8000emu-libretro --release --target aarch64-apple-ios-sim

      - name: Create universal binary and stage
        shell: bash
        run: |
          out="libretro/spmp8000-emu-ios"
          mkdir -p "$out/simulator"
          lipo -create \
            target/aarch64-apple-ios/release/libspmp8000emu.dylib \
            target/x86_64-apple-ios/release/libspmp8000emu.dylib \
            -output "$out/spmp8000emu_libretro_ios.dylib"
          cp target/aarch64-apple-ios-sim/release/libspmp8000emu.dylib \
             "$out/simulator/spmp8000emu_libretro_ios.dylib"
          cp crates/spmp8000emu-libretro/spmp8000emu_libretro.info "$out/"
          ls -laR "$out"

      - name: Package libretro
        shell: bash
        run: |
          cd libretro
          tar czf ../spmp8000-emu-ios-libretro.tar.gz spmp8000-emu-ios
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: spmp8000-emu-ios
          path: spmp8000-emu-ios-libretro.tar.gz

  build-webos:
    name: Build (webOS)
    runs-on: ubuntu-22.04
    env:
      WEBOS_TOOLCHAIN_URL: https://github.com/openlgtv/buildroot-nc4/releases/latest/download/arm-webos-linux-gnueabi_sdk-buildroot-x86_64.tar.gz
      RUST_TARGET: armv7-unknown-linux-gnueabi

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.RUST_TARGET }}

      - name: Install webOS toolchain
        shell: bash
        run: |
          curl -L "$WEBOS_TOOLCHAIN_URL" -o "$RUNNER_TEMP/webos-toolchain.tar.gz"
          mkdir -p "$RUNNER_TEMP/webos-toolchain"
          tar xf "$RUNNER_TEMP/webos-toolchain.tar.gz" \
            -C "$RUNNER_TEMP/webos-toolchain" --strip-components=1
          cd "$RUNNER_TEMP/webos-toolchain"
          ./relocate-sdk.sh
          echo "$RUNNER_TEMP/webos-toolchain/bin" >> "$GITHUB_PATH"

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: release-webos

      - name: Build libretro core
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABI_LINKER: arm-webos-linux-gnueabi-gcc
          CC_armv7_unknown_linux_gnueabi: arm-webos-linux-gnueabi-gcc
          AR_armv7_unknown_linux_gnueabi: arm-webos-linux-gnueabi-ar
        run: cargo build -p spmp8000emu-libretro --release --target ${{ env.RUST_TARGET }}

      - name: Verify ELF binary
        shell: bash
        run: |
          arm-webos-linux-gnueabi-readelf -h target/${{ env.RUST_TARGET }}/release/libspmp8000emu.so
          arm-webos-linux-gnueabi-readelf -d target/${{ env.RUST_TARGET }}/release/libspmp8000emu.so

      - name: Stage libretro core
        shell: bash
        run: |
          out="libretro/spmp8000-emu-webos"
          mkdir -p "$out"
          cp target/${{ env.RUST_TARGET }}/release/libspmp8000emu.so "$out/spmp8000emu_libretro.so"
          cp crates/spmp8000emu-libretro/spmp8000emu_libretro.info "$out/"
          ls -laR "$out"

      - name: Package libretro
        shell: bash
        run: |
          cd libretro
          tar czf ../spmp8000-emu-webos-libretro.tar.gz spmp8000-emu-webos
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: spmp8000-emu-webos
          path: spmp8000-emu-webos-libretro.tar.gz

  release:
    name: Create Release
    needs: [build, build-android, build-ios, build-webos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: false
          generate_release_notes: true
          name: "SPMP8000 Emulator ${{ github.ref_name }}"
          body: |
            SPMP8000 Emulator ${{ github.ref_name }}

            ## Downloads

            ### Standalone emulator
            - **Linux x86_64**: `spmp8000-emu-linux-x86_64.tar.gz`
            - **Linux aarch64**: `spmp8000-emu-linux-aarch64.tar.gz`
            - **macOS x86_64**: `spmp8000-emu-macos-x86_64.tar.gz`
            - **macOS aarch64**: `spmp8000-emu-macos-aarch64.tar.gz`
            - **Windows x86_64**: `spmp8000-emu-windows-x86_64.zip`

            ### libretro core (for RetroArch)
            - Files ending in `-libretro.*` contain `spmp8000emu_libretro.<ext>`,
              plus `spmp8000emu_libretro.info`, ready to drop into RetroArch.
            - **Android**: `spmp8000-emu-android-libretro.tar.gz` (arm64-v8a, armeabi-v7a, x86, x86_64)
            - **iOS**: `spmp8000-emu-ios-libretro.tar.gz` (universal arm64+x86_64 device + arm64 simulator)
            - **webOS**: `spmp8000-emu-webos-libretro.tar.gz` (armv7)
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
